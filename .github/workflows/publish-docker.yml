name: Build and publish Docker image

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: [self-hosted, ARM64, linux]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push with BuildKit
        env:
          BUILDKIT_HOST: tcp://buildkitd.github-runner.svc.cluster.local:1234
        run: |
          buildctl build \
            --frontend dockerfile.v0 \
            --local context=. \
            --local dockerfile=. \
            --output type=image,name=ghcr.io/${{ github.repository_owner }}/lurker:latest,push=true \
            --export-cache type=registry,ref=ghcr.io/${{ github.repository_owner }}/lurker:buildcache \
            --import-cache type=registry,ref=ghcr.io/${{ github.repository_owner }}/lurker:buildcache
